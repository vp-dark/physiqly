<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physiqly - Fitness Intelligence Dashboard</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at top, #0f1420, #07090d);
    color: white;
}

/* HERO */
.hero {
    text-align: center;
    padding: 50px 20px;
}

.hero h1 {
    font-size: 42px;
    margin: 0;
    background: linear-gradient(90deg, #4cafef, #7CFFB2);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.hero p {
    color: #aaa;
    margin-top: 10px;
}

/* LAYOUT */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}

/* GLASS CARD */
.card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 20px;
    margin: 15px 0;
    border-radius: 16px;
    backdrop-filter: blur(12px);
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-4px);
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.4);
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #4cafef, #7CFFB2);
    font-weight: bold;
    cursor: pointer;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 15px;
}

/* RESULTS */
.result {
    margin-top: 10px;
    font-size: 16px;
    color: #7CFFB2;
}

/* SCORE */
.scoreBox {
    text-align: center;
    font-size: 22px;
    padding: 15px;
    border-radius: 12px;
    background: rgba(76,175,239,0.1);
    border: 1px solid rgba(76,175,239,0.3);
}
</style>
</head>

<body>

<div class="hero">
    <h1>Physiqly</h1>
    <p>Your Personal Fitness Intelligence System</p>
</div>

<div class="container">

<!-- INPUT -->
<div class="card">
    <h2>Enter Your Details</h2>

    <input id="weight" type="number" placeholder="Weight (kg)">
    <input id="height" type="number" placeholder="Height (cm)">
    <input id="age" type="number" placeholder="Age">

    <select id="gender">
        <option value="male">Male</option>
        <option value="female">Female</option>
    </select>

    <input id="waist" type="number" placeholder="Waist (cm)">
    <input id="hip" type="number" placeholder="Hip (cm)">
    <input id="pushups" type="number" placeholder="Max Push-ups">
    <input id="run" type="number" placeholder="1 km Run Time (minutes)">

    <button onclick="calculate()">Generate Physiqly Report</button>
</div>

<!-- SCORE -->
<div class="card">
    <h2>Physiqly Score</h2>
    <div class="scoreBox" id="score">-- / 100</div>
</div>

<!-- RESULTS GRID -->
<div class="grid">

<div class="card"><h3>BMI</h3><div class="result" id="bmi"></div></div>
<div class="card"><h3>BMR</h3><div class="result" id="bmr"></div></div>
<div class="card"><h3>TDEE</h3><div class="result" id="tdee"></div></div>
<div class="card"><h3>Body Fat %</h3><div class="result" id="bf"></div></div>
<div class="card"><h3>Waist Hip Ratio</h3><div class="result" id="whr"></div></div>
<div class="card"><h3>Lean Body Mass</h3><div class="result" id="lbm"></div></div>
<div class="card"><h3>VO₂ Max</h3><div class="result" id="vo2"></div></div>
<div class="card"><h3>Strength Score</h3><div class="result" id="strength"></div></div>

</div>

</div>

<script>
function calculate() {

let weight = +document.getElementById("weight").value;
let height = +document.getElementById("height").value;
let age = +document.getElementById("age").value;
let gender = document.getElementById("gender").value;
let waist = +document.getElementById("waist").value;
let hip = +document.getElementById("hip").value;
let pushups = +document.getElementById("pushups").value;
let run = +document.getElementById("run").value;

// BMI
let bmi = weight / ((height/100)**2);

// BMR
let bmr = gender === "male"
? 10*weight + 6.25*height - 5*age + 5
: 10*weight + 6.25*height - 5*age - 161;

// TDEE
let tdee = bmr * 1.55;

// Body fat
let bf = (1.2*bmi) + (0.23*age) - (10.8*(gender==="male"?1:0)) - 5.4;

// WHR
let whr = waist / hip;

// Lean mass
let lbm = weight * (1 - bf/100);

// VO2 max estimate
let vo2 = 15.3 * (220 / run);

// Strength
let strength = (pushups*2) + (100/run);

// FITNESS SCORE (core upgrade)
let score =
Math.max(0,
100 -
Math.abs(22 - bmi)*2 -
bf*0.7 +
pushups*0.5 +
(60/run)
);

score = Math.min(100, score);

// OUTPUT
document.getElementById("bmi").innerText = bmi.toFixed(1);
document.getElementById("bmr").innerText = bmr.toFixed(0) + " kcal";
document.getElementById("tdee").innerText = tdee.toFixed(0) + " kcal";
document.getElementById("bf").innerText = bf.toFixed(1) + "%";
document.getElementById("whr").innerText = whr.toFixed(2);
document.getElementById("lbm").innerText = lbm.toFixed(1) + " kg";
document.getElementById("vo2").innerText = vo2.toFixed(1);
document.getElementById("strength").innerText = strength.toFixed(1);
document.getElementById("score").innerText = score.toFixed(0) + " / 100";

}
</script>

</body>
</html>
